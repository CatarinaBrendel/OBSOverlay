<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Challonge Module</title>
  <style>
    html,body{height:100%;margin:0}
    #previewWrapper{width:100%;height:100vh;overflow:hidden}
    iframe{border:0;width:100%;height:100vh;display:block;transform-origin:0 0}
    .open { position: fixed; right: 12px; top: 12px; z-index: 999; background:#fff;padding:6px 8px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.15);font-family:system-ui,Arial,Helvetica,sans-serif;font-size:13px }
  </style>
</head>
<body>
  <a class="open" href="https://challonge.com/de/2XKOvsSFEAM2/module" target="_blank" rel="noopener">Open Challonge in new tab</a>
  <div id="previewWrapper">
    <iframe id="challongeFrame" src="https://challonge.com/de/2XKOvsSFEAM2/module" title="Challonge module" allowfullscreen allowtransparency="true" scrolling="auto"></iframe>
  </div>

  <script>
    (function(){
      const frame = document.getElementById('challongeFrame');
      const wrapper = document.getElementById('previewWrapper');
      function applyScale(s){
        try{
          const n = Number(s) || 1;
          frame.style.width = (100 / n) + '%';
          frame.style.height = (100 / n) + 'vh';
          frame.style.transform = 'scale(' + n + ')';
          // keep wrapper height fixed to viewport so scaled content fits
          wrapper.style.height = (100 * n) + 'vh';
        }catch(e){console.warn('applyScale error',e)}
      }

      // open WS to receive iframe updates
      try{
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(protocol + '://' + location.host);
        ws.addEventListener('message', (ev)=>{
          try{
            const msg = JSON.parse(ev.data);
            if (!msg) return;
            if (msg.type === 'iframe' && msg.iframe) {
              const ifr = msg.iframe;
              if (ifr.src) {
                if (frame.src !== ifr.src) frame.src = ifr.src;
              } else if (ifr.html) {
                // use srcdoc when provided
                frame.removeAttribute('src');
                frame.srcdoc = ifr.html;
              }
              if (typeof ifr.scale !== 'undefined' && ifr.scale !== null) applyScale(ifr.scale);
            }
          }catch(e){/* ignore malformed messages */}
        });
      }catch(e){console.warn('WS connect failed',e)}

      // apply initial scale if iframeState has scale via fetching /iframe
      (async function(){
        try{
          const r = await fetch('/iframe', {cache:'no-store'}).catch(()=>null);
          if (!r) return;
          const j = await r.json().catch(()=>null);
          if (j && typeof j.scale !== 'undefined' && j.scale !== null) applyScale(j.scale);
          if (j && j.src && frame.src !== j.src) frame.src = j.src;
          if (j && j.html) frame.srcdoc = j.html;
        }catch(e){}
      })();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>OBS Overlay</title>
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <div class="topbar">
    <div class="player left">
      <div class="name" id="leftName">PLAYER 1</div>
      <div class="score" id="leftScore">0</div>
    </div>

    <div class="middle">
      <div class="round" id="roundText">POOLS</div>
    </div>

    <div class="player right">
      <div class="score" id="rightScore">0</div>
      <div class="name" id="rightName">PLAYER 2</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-left" id="footerTextLeft">TWITCH.TV/YOURCHANNEL</div>
    <div class="footer-logo">
      <img src="assets/2XKO_Icon.png" alt="2xKO logo" class="footer-logo-img" />
    </div>
    <div class="footer-right" id="footerTextRight">TWITCH.TV/YOURCHANNEL</div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
